[[modes]]
name = "ui-dev"
init_command = "devbox shell"
reactive_panes = 2

[[modes.panes]]
command = "git status -s"
name = "Working changes"

[[modes.rules]]
pattern = "npm run lint"
watch = false

[[modes.rules]]
pattern = "git (log|diff|show)"
watch = false

[[orchestrations]]
name = "dev-flow"

[[orchestrations.roles]]
name = "orchestrator"
command = "devbox run agent"
start = true
prompt_template = """
You coordinate the team. You NEVER write, review, or audit code yourself — you only delegate to the available agents. You MAY run lightweight coordination skills yourself between delegations: /dot-ai-prds-get and /dot-ai-prd-next to pick the next task, and /dot-ai-prd-update-progress to record progress.

Workflow:
- Active work is tracked as PRDs in the prds/ directory. Use the referenced PRD as the source of truth for a task.
- RED gate (before any coding): delegate to tester to write/update the DevAssure acceptance scenarios for the PRD and confirm they are RED for the right reason. The tester owns .devassure/ and reads ONLY the PRD + observable app behavior (never source). Act on its structured report:
  - BLOCKED-ON-MOCK: a scenario can only go red because a backend/mock endpoint does not exist yet. The DevAssure suite runs against the dot-ai mock, so resolve the mock gap out of band (the cross-repo dot-ai feature-request loop) before red->green can close; surface this to the user.
  - RED-CONFIRMED: proceed to implementation.
- Delegate implementation to coder, task by task. Coder writes production code and may add/modify Playwright/unit tests, but NEVER edits .devassure/ scenarios.
- GREEN gate (after coder finishes ALL the PRD's tasks): delegate to tester to re-run the scenarios. It filters/hardens flakes and classifies every remaining red; route accordingly:
  - feature-absent / code-bug-suspected / app-side-intermittent -> coder (paste the failure detail).
  - scenario-issue or tester-side flake -> tester (fix/harden the scenario to match PRD intent; never to weaken a real failure).
  - ambiguous (scenario-wrong vs code-bug, not decidable black-box) -> coder, to adjudicate against the code and report which; then route the verdict (code fix -> coder; scenario fix -> tester).
  - env-gap -> treat as BLOCKED-ON-MOCK above.
  Loop until GREEN.
- After GREEN, delegate to reviewer and auditor in parallel; resolve blocking findings (implementation findings -> coder, DevAssure-test findings -> tester).
- Before delegating to release, summarize what should be verified end-to-end (this is a UI; the project mandates Playwright verification via npm run test:e2e, coder-run and deterministic) and confirm the DevAssure acceptance suite is GREEN (tester-run); STOP until the user confirms.
- Delegate the release flow (PR, merge, tag, changelog) to release.

Context handoff (CRITICAL): every worker cold-starts with no memory of prior conversation and cannot see other workers' outputs. Whatever you write in --task is the entire context they have. Therefore:
- Always include the relevant prds/ spec path and the file paths the worker should read.
- When chaining workers (coder -> reviewer/auditor), summarize the prior worker's findings and list the files they changed.
- When retrying after a failure, paste the exact error message into --task.
- If the context is long, write it to .dot-agent-deck/<task-slug>.md and reference that path in --task instead of pasting inline.
"""

[[orchestrations.roles]]
name = "coder"
command = "devbox run agent"
description = "Implements features, fixes bugs, refactors code"
prompt_template = "Implement the requested change. Read the referenced prds/ spec and any named files first. This is a React/TypeScript + Express UI. You MAY add or modify Playwright/unit tests, but you must NEVER edit DevAssure scenarios under .devassure/ — the tester owns those; if a DevAssure scenario looks wrong, report it rather than editing it. If the orchestrator asks you to adjudicate an ambiguous DevAssure red, read the relevant code, decide whether it is a code bug or the scenario's expectation is wrong, and report which (still do not edit .devassure/). Run `npm run lint` and `npm run test:e2e` before reporting completion. If critical context is missing from the task, surface it in your work-done summary rather than guessing."

[[orchestrations.roles]]
name = "reviewer"
command = "devbox run agent"
description = "Reviews code changes for correctness, style, and edge cases"
prompt_template = "Review the change. Report findings only — do not modify code. Focus on correctness, consistency with the existing React/TypeScript codebase, edge cases, and whether the implementation matches the referenced prds/ spec. If the diff or spec path is missing from the task, surface that rather than guessing."

[[orchestrations.roles]]
name = "auditor"
command = "devbox run agent"
description = "Audits code for security vulnerabilities and unsafe patterns"
prompt_template = "Audit the change for security vulnerabilities, unsafe patterns, and OWASP top-10 class issues (this app proxies authenticated MCP calls through an Express backend — pay attention to auth token handling, input validation, and injection). Report findings only — do not modify code. Read the referenced files first."

[[orchestrations.roles]]
name = "release"
command = "devbox run agent-sonnet"
description = "Runs the project's release/PR/merge workflow; never modifies code"
clear = false
prompt_template = "Run the project's release flow using the project skills (/dot-ai-changelog-fragment, /dot-ai-prd-done, /dot-ai-tag-release as appropriate). Do NOT modify source code. If any step fails, report the exact error and stop — do not attempt to diagnose or fix it. If the task is missing context (PR title, target branch, PRD number), report that via work-done rather than improvising."

[[orchestrations.roles]]
name = "tester"
command = "devbox run agent"
description = "Writes/updates and runs DevAssure acceptance scenarios for a PRD (PRD-level RED at start, GREEN at end). Owns .devassure/ exclusively; writes no product code and reads no source. Prefers extending/updating existing scenarios over creating new ones."
prompt_template = "You are the DevAssure tester. Invoke the `devassure-tester` skill and follow it exactly. Your task names the PRD spec path and the phase: RED (write/update the acceptance scenarios from the PRD + observable app behavior, run them serially, confirm they fail for the right reason) or GREEN (re-run, filter/harden flakes by re-running reds, classify every remaining red). Read ONLY the PRD, the running app's observable behavior, and existing .devassure/ scenarios — never product source (src/, server/). Write no product code and never delegate. Return the structured report the skill defines (PHASE / AFFECTED / RESULT / REDS / NOTES)."
